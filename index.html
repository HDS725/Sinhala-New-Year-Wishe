<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy New Year 2026 ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff1f2 0%, #ffdde1 100%);
            font-family: 'Segoe UI', 'Sinhala', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #surprise-btn {
            padding: 20px 45px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #d81b60, #ff4081);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.4s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
        }

        #surprise-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px 15px rgba(255, 193, 7, 0.7); 
            background: linear-gradient(45deg, #ff1744, #d81b60);
        }

        /* මෙන්න මෙතන තමයි වෙනස් කළේ */
        #main-content {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            width: 90%;            /* ෆෝන් වලදී screen එකෙන් 90% ක් පළල ගන්නවා */
            max-width: 480px;      /* උපරිම පළල 480px වලට සීමා කළා */
            height: auto;          /* උස අන්තර්ගතය අනුව හැඩ ගැසෙනවා */
            min-height: 580px;
            padding: 25px;
            border-radius: 35px;
            border: 4px solid #d81b60;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            flex-direction: column;
            align-items: center;
            z-index: 10;
            position: relative;
            overflow-y: auto;      /* අකුරු වැඩි වුණොත් scroll කරන්න පුළුවන් */
        }

        .year-display {
            font-size: 2.8rem;
            font-weight: bold;
            color: #d81b60;
            margin-bottom: 5px;
            animation: pulse 1.5s infinite ease-in-out;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #ff4081; }
            100% { transform: scale(1); }
        }

        h1 {
            color: #d81b60;
            font-size: 1.8rem;
            margin: 0 0 50px 0;
            text-align: center;
        }

       #typing-area {
    width: 100%;
    height: 380px;      /* උස තවත් ටිකක් වැඩි කළා ෆෝන් එකට ගැලපෙන්න */
    margin-bottom: 20px;
    text-align: center;
    display: block;
    overflow: visible;  /* කැපෙන එක නතර කරන්න hidden වෙනුවට visible දාන්න */
    padding-bottom: 20px; /* යටින් අමතර ඉඩක් */
}

#typing-text {
    font-size: 1.1rem;
    line-height: 2.0;   /* 1.8 වෙනුවට 2.0 කළා, එතකොට පාපිලි වලට හොඳට ඉඩ තියෙනවා */
    color: #333;
    font-weight: 700;   /* ඔයාට තදට ඕන නිසා 700 කළා */
    display: inline-block;
    padding: 10px;
}

#typing-text {
    font-size: 1.1rem;
    line-height: 1.8;
    color: #333;
    font-weight: 600;    /* මේකෙන් අකුරු "තදට" (Medium Bold) පේනවා, ඕනෑවට වඩා තද නැහැ */
    display: inline-block;
    padding: 10px;
}

        #signature {
            color: #d81b60;
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            transition: opacity 2s ease, transform 2s cubic-bezier(0.22, 1, 0.36, 1);
            text-align: center;
            margin-top: 30px; /* ඉඩ ප්‍රමාණය අඩු කළා ෆෝන් එකට ගැලපෙන්න */
            padding-bottom: 20px;
        }

        #signature.pop-up {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #to-love {
            font-weight: bold;
            font-style: italic;
            font-size: 1rem;
            display: block;
            margin-bottom: 5px;
        }

        #user-name {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            display: block;
        }

        /* ෆෝන් එකේ අකුරු තවත් ටිකක් පොඩි කිරීමට (Media Query) */
        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            .year-display { font-size: 2.3rem; }
            #typing-text { font-size: 1rem; }
        }

        .bg-heart {
            position: absolute;
            color: #ff1744;
            font-size: 20px;
            bottom: -50px;
            animation: rise linear infinite;
            z-index: 1;
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="https://github.com/HDS725/my-assets/raw/refs/heads/main/Heart%20Touching%20Shayari%20background%20music%20%F0%9F%8E%B6%20Instrumental%20Ringtone%20%F0%9F%92%97%20New%20Mobile%20Ringtone%202022%20-%20DharmendraSaab3.mp3" type="audio/mpeg">
    </audio>

    <button id="surprise-btn" onclick="openSurprise()">SURPRISE CHUTI ✨</button>

    <div id="main-content">
        <div class="year-display">2026</div>
        <h1>සුභ අලුත් අවුරුද්දක් වේවා!</h1>
        
        <div id="typing-area">
            <span id="typing-text"></span>
        </div>

        <div id="signature">
            <span id="to-love">මෙයට ඔබේ ආදරණීය</span>
            <span id="user-name">Hasanga Dilshan</span>
        </div>
    </div>

    <script>
        function openSurprise() {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio play blocked by browser"));

            document.getElementById('surprise-btn').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';

            var end = Date.now() + (5 * 1000);
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#ff1744', '#ffd54f', '#ffffff'] });
                confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#ff1744', '#ffd54f', '#ffffff'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            startTyping();
        }

        const fullText = "ලැබුවා වූ මේ සිංහල දෙමළ අලුත් අවුරුද්ද මගේ රත්තරන් පැටියට සාමය, සතුට පිරි, කිසිම ලෙඩක් දුකක් නැති, කරදර බාධාවලින් තොර වාසනාවන්ත අවුරුද්දක් වේවා! කිරියෙන් පැණියෙන් ඉතිරෙනවා! ඒ වගේම අපේ ආදරයත් මේ අවුරුද්ද පුරාම සතුටින් පිරී ඉතිරෙන්න කියලා මම මගේ මුළු හදවතින්ම ප්‍රාර්ථනා කරනවා. හැමදාමත් මගේම වෙලා මගේ ළඟින්ම ඉන්න! සුබම සුබ අලුත් අවුරුද්දක් වේවා මගේ පණ! 🌸❤️";
        let i = 0;

        function startTyping() {
            if (i < fullText.length) {
                document.getElementById("typing-text").innerHTML += fullText.charAt(i);
                i++;
                setTimeout(startTyping, 75);
            } else {
                setTimeout(() => {
                    document.getElementById('signature').classList.add('pop-up');
                }, 500);
            }
        }

        function createRisingHeart() {
            const h = document.createElement('div');
            h.classList.add('bg-heart');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 15 + 10 + 'px';
            h.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }
        setInterval(createRisingHeart, 400);
    </script>
</body>
</html>
