<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy New Year 2026 ❤️</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gemunu+Libre:wght@700;800&family=Clicker+Script&family=Noto+Serif+Sinhala:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff5f6; 
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* --- Highlighting & Animated Button --- */
        #surprise-btn {
            padding: 18px 50px;
            font-size: 1.3rem;
            background: linear-gradient(270deg, #ff1e56, #8e44ad, #ff1e56);
            background-size: 400% 400%;
            animation: gradientFlow 3s ease infinite;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(142, 68, 173, 0.3);
            transition: all 0.4s ease;
            outline: none;
            min-width: 220px;
            text-align: center;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* බටන් එක එබූ පසු Highlight වී දිස්නය දෙන ආකාරය */
        #surprise-btn.loading {
            transform: scale(1.1);
            box-shadow: 0 0 30px 10px rgba(142, 68, 173, 0.6), 0 0 50px 20px rgba(255, 30, 86, 0.4);
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* --- Fixed Content Box --- */
        #main-content {
            display: none;
            background: rgba(255, 255, 255, 0.5) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 90vw;
            max-width: 400px;
            height: 520px; 
            padding: 25px;
            border-radius: 30px;
            border: 3px solid #d81b60; 
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15);
            flex-direction: column;
            align-items: center;
            z-index: 10;
            position: relative;
        }

        .year-display { font-size: 2.2rem; font-weight: 900; color: #d81b60; font-family: 'Noto Serif Sinhala', serif; margin-bottom: 5px; }
        h1 { color: #d81b60; font-size: 1.6rem; margin: 0 0 15px 0; text-align: center; font-family: 'Noto Serif Sinhala', serif; font-weight: 900; }

        #typing-area { width: 100%; height: 220px; text-align: center; overflow: hidden; }
        #typing-text { font-family: 'Gemunu Libre', sans-serif; font-size: 1.15rem; line-height: 1.6; color: #222; font-weight: 500; }

        #signature {
            color: #d81b60; opacity: 0; text-align: center; margin-top: auto; padding-bottom: 10px; transition: opacity 1.5s ease;
        }
        #signature.pop-up { opacity: 1; }
        #user-name { font-family: 'Clicker Script', cursive; font-size: 2.2rem; display: block; margin-top: -5px; }

        .bg-heart { position: absolute; color: #ff4d6d; bottom: -50px; animation: rise linear infinite; z-index: 1; }
        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

<body>

    <audio id="bg-music" loop>
        <source src="https://github.com/HDS725/my-assets/raw/refs/heads/main/Heart%20Touching%20Shayari%20background%20music%20%F0%9F%8E%B6%20Instrumental%20Ringtone%20%F0%9F%92%97%20New%20Mobile%20Ringtone%202022%20-%20DharmendraSaab3.mp3" type="audio/mpeg">
    </audio>

    <button id="surprise-btn" onclick="startLoading(this)">SURPRISE CHUTI ✨</button>

    <div id="main-content">
        <div class="year-display">2026</div>
        <h1>සුභ අලුත් අවුරුද්දක් වේවා!</h1>
        <div id="typing-area"><span id="typing-text"></span></div>
        <div id="signature">
            <span style="font-family: 'Noto Serif Sinhala'; font-size: 0.85rem; font-weight: 900;">මෙයට ඔබේ ආදරණීය</span>
            <span id="user-name">Hasanga Dilshan</span>
        </div>
    </div>

    <script>
        function startLoading(btn) {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio blocked"));

            // Button එක Highlight කිරීම
            btn.classList.add('loading');
            
            let count = 0;
            // Loading Animation එක (0 සිට 100 දක්වා)
            const interval = setInterval(() => {
                count++;
                btn.innerHTML = `LOADING ${count}%`;
                
                if (count >= 100) {
                    clearInterval(interval);
                    // 100% වුණාම සිනිදුව මැකී යාම
                    btn.style.opacity = '0';
                    btn.style.transform = 'scale(1.5)';
                    
                    setTimeout(() => {
                        btn.style.display = 'none';
                        showContent();
                    }, 500);
                }
            }, 30); // වේගය මෙතැනින් පාලනය කළ හැක (30ms)
        }

        function showContent() {
            const main = document.getElementById('main-content');
            main.style.display = 'flex';

            // Confetti
            var end = Date.now() + (2 * 1000);
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#a777e3', '#ff4081'] });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#a777e3', '#ff4081'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            startTyping();
        }

        const fullText = "ලැබුවා වූ මේ සිංහල දෙමළ අලුත් අවුරුද්ද මගේ රත්තරන් පැටියට සාමය, සතුට පිරි, කිසිම ලෙඩක් දුකක් නැති, කරදර බාධාවලින් තොර වාසනාවන්ත අවුරුද්දක් වේවා! කිරියෙන් පැණියෙන් ඉතිරෙනවා! ඒ වගේම අපේ ආදරයත් මේ අවුරුද්ද පුරාම සතුටින් පිරී ඉතිරෙන්න කියලා මම මගේ මුළු හදවතින්ම ප්‍රාර්ථනා කරනවා. හැමදාමත් මගේම වෙලා මගේ ළඟින්ම ඉන්න! සුබම සුබ අලුත් අවුරුද්දක් වේවා මගේ පණ! 🌸❤️";
        let i = 0;

        function startTyping() {
            if (i < fullText.length) {
                document.getElementById("typing-text").innerHTML += fullText.charAt(i);
                i++;
                setTimeout(startTyping, 45); 
            } else {
                setTimeout(() => {
                    document.getElementById('signature').classList.add('pop-up');
                }, 400);
            }
        }

        function createRisingHeart() {
            const h = document.createElement('div');
            h.classList.add('bg-heart');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 15 + 10 + 'px'; 
            h.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }
        setInterval(createRisingHeart, 300);
    </script>
</body>
</html>
